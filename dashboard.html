<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Daily Planner</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<header>

<div class="top-header">

<div class="month-nav">

<button
class="nav-btn"
onclick="prevMonth()">

←

</button>

<h1 id="judulBulan">

</h1>

<button
class="nav-btn"
onclick="nextMonth()">

→

</button>

</div>

<button
class="logout"
onclick="logout()">

Logout

</button>

</div>

</header>


<!-- KALENDER -->

<div id="calendar">

</div>


<!-- INPUT KEGIATAN -->

<div class="card">

<h2 id="tanggal">

Pilih Tanggal

</h2>

<div class="input">

<input

id="task"

type="text"

placeholder=
"Tulis kegiatan..."

>

<button
onclick="tambah()">

Tambah

</button>

</div>

</div>


<!-- AGENDA -->

<div class="card">

<h2>

Agenda Hari Ini

</h2>

<div id="todo">

</div>

</div>


<!-- PROGRESS -->

<div class="card">

<h2>

Progress Harian

</h2>

<div class="progress">

<div id="fill">

</div>

</div>

<p id="persen">

0% selesai

</p>

</div>


<!-- RIWAYAT -->

<div class="card">

<h2>

Aktivitas Selesai

</h2>

<div id="done">

</div>

</div>

</div>


<script
src="script.js">

</script>

</body>

</html>
