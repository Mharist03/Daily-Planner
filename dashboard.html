<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width">

<title>Dashboard</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<header>

<h1>
📅 Daily Planner
</h1>

<button onclick="logout()">
Logout
</button>

</header>

<div id="calendar">

</div>

<div class="card">

<h2 id="tanggal">

</h2>

<div class="input">

<input
id="task"
placeholder="Tambah kegiatan">

<button onclick="tambah()">
+
</button>

</div>

</div>

<div class="card">

<h2>
Agenda Hari Ini
</h2>

<div id="todo">

</div>

</div>

<div class="card">

<h2>
Progress
</h2>

<div class="progress">

<div id="fill">

</div>

</div>

<p id="persen">

</p>

</div>

<div class="card">

<h2>
Aktivitas Selesai
</h2>

<div id="done">

</div>

</div>

</div>

<script src="script.js">

</script>

</body>

</html>
